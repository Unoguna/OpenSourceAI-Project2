generator:
  z_dim: 512
  resolutions: [4, 8, 16, 32, 64, 128, 256, 512, 1024]
  channels:
    4: 512
    8: 512
    16: 512
    32: 512
    64: 384
    128: 192
    256: 96
    512: 48
    1024: 24
  norm_type: gn
  gn_groups: 32
  attention_resolutions: [32]

discriminator:
  resolutions: [1024, 512, 256, 128, 64, 32, 16, 8, 4]
  channels:
    1024: 24
    512: 48
    256: 96
    128: 192
    64: 384
    32: 512
    16: 512
    8: 512
    4: 512
  use_spectral_norm: true
  minibatch_std_group: 4
  attention_resolutions: [32]

training:
  train_zip: data/train_50k_1024.zip
  resolution: 1024
  batch_size: 4
  total_images: 2_000_000
  num_workers: 8
  flip: true

  precision: fp32
  augment: color,translation

  lr_g: 0.0002
  lr_d: 0.0002
  beta1: 0.0
  beta2: 0.9
  weight_decay: 0.0

  grad_clip_g: 10.0
  grad_clip_d: 100.0

  r1_gamma: 10.0
  r1_lazy_every: 16

  ema_half_life: 10_000

  ckpt_every: 50_000

  log_every: 50
  sample_n: 16
  sample_seed: 12345
  seed: 43

wandb:
  project: ffhqgen-student
  name: quality_1024
  mode: disabled

out:
  run_dir: runs/quality_1024
